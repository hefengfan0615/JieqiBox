name: Build Android and Release

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-android:
    name: Build Android (no-yolo, with Pikafish engine + NNUE)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          ndk: 26.1.10909125
          build-tool: '34.0.0'

      - name: Export NDK environment variables
        run: |
          NDK_PATH="${ANDROID_NDK_ROOT:-$ANDROID_NDK_LATEST_HOME}"
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> "$GITHUB_ENV"
          echo "NDK_HOME=$NDK_PATH"          >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android, i686-linux-android

      - name: Install 7z
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Download NNUE net
        shell: bash
        run: |
          set -euo pipefail
          NNUE_URL="https://github.com/official-pikafish/Pikafish/releases/download/Pikafish-2024-08-31/Pikafish.2024-08-31.7z"
          echo "Downloading NNUE from $NNUE_URL"
          curl -L --fail -o pikafish.7z "$NNUE_URL"
          if [ ! -s pikafish.7z ]; then
            echo "::error::NNUE 7z download failed or file is empty"
            exit 1
          fi
          echo "Extracting 7z archive..."
          7z x pikafish.7z -oextracted_nnue -y
          # Find the .nnue file
          NNUE_FILE=$(find extracted_nnue -type f -name "*.nnue" | head -n 1)
          if [ -z "$NNUE_FILE" ]; then
            echo "::error::No .nnue file found in extracted archive"
            find extracted_nnue -type f
            exit 1
          fi
          echo "Found NNUE file: $NNUE_FILE"
          mkdir -p engine_assets
          cp "$NNUE_FILE" engine_assets/nnue.bin
          echo "NNUE file copied to engine_assets/nnue.bin"

      - name: Compile Pikafish engine for Android ARM64
        shell: bash
        run: |
          set -euo pipefail
          cd engine/src
          # Add NDK toolchain to PATH
          NDK_TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"
          export PATH="$NDK_TOOLCHAIN:$PATH"
          echo "NDK toolchain path: $NDK_TOOLCHAIN"
          make clean
          make -j build COMP=ndk ARCH=armv8 EXE=pikafish-armv8
          llvm-strip pikafish-armv8
          cp pikafish-armv8 ../../engine_assets/
          echo "Pikafish engine compiled for Android ARM64"

      - name: Test engine (initial position, depth 20)
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get install -y qemu-user-static
          cd engine_assets
          echo "=== Testing Pikafish engine: initial position, depth 20 ==="
          echo -e "uci\nisready\nucinewgame\nposition startpos\ngo depth 20\nquit" | qemu-aarch64-static ./pikafish-armv8 2>&1 || true
          echo "=== Engine test completed ==="

      - name: Copy engine + NNUE to Tauri resources
        run: |
          mkdir -p src-tauri/engines
          cp engine_assets/pikafish-armv8 src-tauri/engines/
          cp engine_assets/nnue.bin src-tauri/engines/
          echo "Engine and NNUE copied to Tauri resources"

      - name: Remove onnxruntime dependencies for no-yolo build
        shell: bash
        run: |
          jq 'del(.dependencies."onnxruntime-web")' package.json > package.json.tmp && mv package.json.tmp package.json
          echo "Removed onnxruntime-web dependency from package.json"
          rm -f src/composables/image-recognition/useImageRecognition.real.ts
          echo "Removed useImageRecognition.real.ts file"
          mv src/composables/image-recognition/index.ts.stub src/composables/image-recognition/index.ts
          echo "Replaced index.ts with stub version"
          sed -i.bak '/import.*vite-plugin-static-copy/d' vite.config.ts
          sed -i.bak '/viteStaticCopy({/,/}),/d' vite.config.ts
          echo "Modified vite.config.ts to remove onnxruntime static copy"

      - name: Install JS dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Update productName for no-yolo build
        shell: bash
        run: |
          jq '.productName = "jieqibox-no-yolo"' src-tauri/tauri.conf.json > tauri.conf.json.tmp && mv tauri.conf.json.tmp src-tauri/tauri.conf.json
          echo "Updated productName to jieqibox-no-yolo in tauri.conf.json"

      - name: Init Tauri Android project
        run: npm install -g @tauri-apps/cli

      - name: Build Tauri Android app (unsigned)
        run: npx tauri android build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_BUNDLE_IDENTIFIER_SUFFIX: '-no-yolo'

      - name: Auto sign the APK
        id: sign_apk
        run: |
          # Auto-generate keystore
          KEYSTORE_PATH=$RUNNER_TEMP/keystore.jks
          STORE_PASS="android"
          KEY_ALIAS="jieqibox"
          KEY_PASS="android"

          keytool -genkey -v \
            -keystore "$KEYSTORE_PATH" \
            -alias "$KEY_ALIAS" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "$STORE_PASS" -keypass "$KEY_PASS" \
            -dname "CN=JieqiBox, OU=Dev, O=JieqiBox, L=Unknown, ST=Unknown, C=CN"

          echo "Keystore generated at $KEYSTORE_PATH"

          UNSIGNED_APK_PATH=$(find src-tauri/gen/android/app/build/outputs/apk -type f -name "*-unsigned.apk" | head -n 1)
          if [ -z "$UNSIGNED_APK_PATH" ]; then
            echo "::error::Unsigned APK not found!"
            find src-tauri/gen/android/app/build/outputs/apk -type f -name "*.apk"
            exit 1
          fi
          echo "Found unsigned APK at: $UNSIGNED_APK_PATH"

          SIGNED_APK_PATH=$(echo "$UNSIGNED_APK_PATH" | sed 's/-unsigned//')
          echo "Signed APK will be saved to: $SIGNED_APK_PATH"

          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks "$KEYSTORE_PATH" \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass pass:"$STORE_PASS" \
            --key-pass pass:"$KEY_PASS" \
            --out "$SIGNED_APK_PATH" \
            "$UNSIGNED_APK_PATH"

          echo "APK signing process completed."

          $ANDROID_HOME/build-tools/34.0.0/apksigner verify "$SIGNED_APK_PATH"
          echo "APK signature verified successfully."

          echo "SIGNED_APK_PATH=$SIGNED_APK_PATH" >> "$GITHUB_ENV"

      - name: Rename APK with commit SHA prefix
        run: |
          SIGNED_APK_PATH="${{ env.SIGNED_APK_PATH }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-6)
          DIRNAME=$(dirname "$SIGNED_APK_PATH")
          NEW_PATH="${DIRNAME}/jieqibox-${SHORT_SHA}-no-yolo.apk"
          echo "Renaming APK to commit SHA prefix: ${SHORT_SHA}"
          mv "$SIGNED_APK_PATH" "$NEW_PATH"
          echo "RENAMED_APK_PATH=$NEW_PATH" >> "$GITHUB_ENV"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: jieqibox-android-no-yolo
          path: |
            src-tauri/gen/android/app/build/outputs/apk/**/release/*.apk
            !src-tauri/gen/android/app/build/outputs/apk/**/release/*-unsigned.apk
          retention-day: 30

  release-android:
    name: Create Android Release
    runs-on: ubuntu-latest
    needs: [build-android]
    permissions:
      contents: write
    steps:
      - name: Download android artifacts
        uses: actions/download-artifact@v4
        with:
          name: jieqibox-android-no-yolo
          path: jieqibox-android-no-yolo

      - name: Create Release with commit SHA
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: 'Pikafish engine + NNUE bundled APK (no-yolo). Commit: ${{ github.sha }}'
          files: |
            jieqibox-android-no-yolo/**/*.apk
            jieqibox-android-no-yolo/**/*.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}